<script>
// variaveis globais para armazenar valor
let senhaCadastrada = []
let emailCadastrado = []

function validaSenha(senha){
    return (senha !== '' && senha.length >= 8 && senha !== senha.toUpperCase() && senha !== senha.toLowerCase() &&
    (senha.includes('!') || senha.includes('@') || senha.includes('#') || senha.includes('$') || senha.includes('%') || senha.includes('&') || senha.includes('_'))
)
}
function validaEmail(email){
    let posicaoArroba = email.indexOf('@')
    let posicaoCom = email.indexOf('.com')
    return (email != '' && email.includes('@')
    && email.includes('.com') && posicaoArroba < posicaoCom && email.endsWith('.com'))
}

function cadastrar() {
    let nome = inputNome.value
    let senha = inputSenha.value
    let email = inputEmail.value
    

    let senhaValida = false
    let emailValido = false
    let existeEmail = false
    // verifica a senha e com o que tá nos requisistos
    if (validaSenha(senha)){  
        senhaCadastrada.push(senha)
        senhaValida = true
    }
    else{alert('Senha inválida')}

    // verifica se E-mail é válido para fazer cadastro de acordo com os requisistos
    if (validaEmail(email))
    {       
        // percorre a lista
        for(let contador = 0; contador < emailCadastrado.length; contador++)
        {
            // se for igual em algum momemto é pq existe
            if(emailCadastrado[contador] == email)
            {
                //muda pra existe dá alerta e dá break que quebra o laço 
                 existeEmail = true
                alert('Email já existe')
                break
            }
        }    
        //após acabar o for vai pro if onde se caso fez toda lista e não está cadastrado, adiciona na lista com push
        if(existeEmail == false)
        {
            emailCadastrado.push(email)
            emailValido = true
        }
          
    }
    else(alert('E-mail inválido'))

    if(senhaValida == true && emailValido == true)
    {

    // Enviando o valor da nova input
        fetch("http://localhost:8080/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            // crie um atributo que recebe o valor recuperado aqui
            // Agora vá para o arquivo routes/usuario.js
            nomeServer: nome,
            emailServer: email,
            senhaServer: senha
        }),
        })
        .then(function (resposta) {
            console.log("resposta: ", resposta);

            if (resposta.ok) {

            alert('Cadastro realizado com sucesso! Redirecionando para tela de Login...')
            

            setTimeout(() => {
                window.location = "loginGNR.html";
            }, 2000);

            
            } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
            }
        })
        .catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
            
        });

        return false;



    }
    



}
