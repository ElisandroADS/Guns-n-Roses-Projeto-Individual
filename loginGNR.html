<body>
     <header>
        <nav class="navbar">

                <a style="color: inherit;" href="gunsnroses.html"><img width="100px" src="https://logosmarcas.net/wp-content/uploads/2020/04/Guns-N-Roses-Logo-650x366.png" alt=""></a>

        </nav>
    </header>

     <div class="card">
        <h2 style="color: white;">Login</h3>
        <p style="color: white;">senha</p>
        <input placeholder="Senha" type="text" id="inputSenha">
        <p style="color: white;">E-mail</p>
        <input placeholder="E-mail" type="text" id="inputEmail"><br>
       
        <button onclick="logar()" class="botaoLogin">You gonna die!!!</button>
    </div>
</body>
</html>
<script>
    function logar()
    {
        let email_digitado = inputEmail.value
        let senha_digitada = inputSenha.value 
      


        fetch("http://localhost:8080/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                emailServer: email_digitado,
                senhaServer: senha_digitada
            }),
            })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {

                alert('Login realizado com sucesso! Redirecionando para tela de Formulário...')
                

                setTimeout(() => {
                    window.location = "gunsnroses.html";
                }, 2000);

                
                } else {
                throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                
            });

            return false;



        

        }
</script>
